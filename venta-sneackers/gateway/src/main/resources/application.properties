server.port=8081

# Route /api/** to app service running in docker-compose on port 8080
spring.cloud.gateway.routes[0].id=app-service
# Use service discovery via Eureka (load-balanced)
spring.cloud.gateway.routes[0].uri=lb://venta-sneackers
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/**

# Route /doc/** (Swagger UI and OpenAPI docs) to the app service
spring.cloud.gateway.routes[1].id=app-doc
spring.cloud.gateway.routes[1].uri=lb://venta-sneackers
spring.cloud.gateway.routes[1].predicates[0]=Path=/doc/**

# Proxy OpenAPI JSON endpoints used by Swagger UI
spring.cloud.gateway.routes[2].id=app-openapi
spring.cloud.gateway.routes[2].uri=lb://venta-sneackers
spring.cloud.gateway.routes[2].predicates[0]=Path=/v3/api-docs/**

# Proxy Swagger UI static resources from the downstream service
spring.cloud.gateway.routes[3].id=app-swagger-ui
spring.cloud.gateway.routes[3].uri=lb://venta-sneackers
spring.cloud.gateway.routes[3].predicates[0]=Path=/swagger-ui/**

# Proxy Swagger support resources from the downstream service
spring.cloud.gateway.routes[4].id=app-swagger-resources
spring.cloud.gateway.routes[4].uri=lb://venta-sneackers
spring.cloud.gateway.routes[4].predicates[0]=Path=/swagger-resources/**

# Eureka client configuration
spring.application.name=gateway
eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka}

management.endpoints.web.exposure.include=health,info

# Swagger UI served by the gateway, pointing to the downstream OpenAPI document
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.urls[0].name=venta-sneackers
springdoc.swagger-ui.urls[0].url=/v3/api-docs
springdoc.api-docs.path=/v3/api-docs
 
# Disable ForwardedHeadersFilter to avoid runtime HttpHeaders API mismatch
spring.cloud.gateway.forwarded.enabled=false
