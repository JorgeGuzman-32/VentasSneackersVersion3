server.port=8081

# Route /api/** to app service running in docker-compose on port 8080
spring.cloud.gateway.routes[0].id=app-service
spring.cloud.gateway.routes[0].uri=http://app:8080
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/**

# Route /doc/** (Swagger UI and OpenAPI docs) to the app service
spring.cloud.gateway.routes[1].id=app-doc
spring.cloud.gateway.routes[1].uri=http://app:8080
spring.cloud.gateway.routes[1].predicates[0]=Path=/doc/**

# Route /v3/api-docs/** (OpenAPI JSON) to the app service
spring.cloud.gateway.routes[2].id=app-openapi
spring.cloud.gateway.routes[2].uri=http://app:8080
spring.cloud.gateway.routes[2].predicates[0]=Path=/v3/api-docs/**

# Route /swagger-ui/** (Swagger UI resources) to the app service
spring.cloud.gateway.routes[3].id=app-swagger-ui
spring.cloud.gateway.routes[3].uri=http://app:8080
spring.cloud.gateway.routes[3].predicates[0]=Path=/swagger-ui/**

# Route /swagger-resources/** (Swagger resources) to the app service
spring.cloud.gateway.routes[4].id=app-swagger-resources
spring.cloud.gateway.routes[4].uri=http://app:8080
spring.cloud.gateway.routes[4].predicates[0]=Path=/swagger-resources/**

management.endpoints.web.exposure.include=health,info

# Swagger configuration for Gateway
springdoc.swagger-ui.urls[0].name=venta-sneackers
springdoc.swagger-ui.urls[0].url=/v3/api-docs
springdoc.api-docs.path=/v3/api-docs
